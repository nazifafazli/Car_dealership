<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Dealership</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Autolux Motors</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#cars">Cars</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="home">
        <div>
            <h2>Find Your Dream Car</h2>
            <p>Luxury, Performance, style</p>
            <button>Explore Cars</button>
        </div>
        
    </section>

    <section id="cars">
        <h2>Featured Cars</h2>

        <div class="car-container">
            <div class="car">
                <img src="bmw.jpg" alt="">
                <h3>BMW M4</h3>
                <p>75000$</p>
                <button>Buy Now</button>

            </div>
            <div class="car">
                <img src="mer.jpg" alt="">
                <h3>Mercedes C-Class</h3>
                <p>65000$</p>
                <button>Buy Now</button>

            </div>
            <div class="car">
                <img src="audi.jpg" alt="">
                <h3>Audi A6</h3>
                <p>70000$</p>
                <button>Buy Now</button>

            </div>

        </div>
    </section>

    <section id="about">
        <p>new car</p>

    </section>

    <section id="contact">
        <h2>Contact Us</h2>

        <input type="text" placeholder="Your Name" id="name">
        <input type="email" id="email" placeholder="Your Email">
        <textarea name="message" id="mess">message</textarea>

        <button>Send</button>

    </section>

    <footer>
        <p>&copy; 2026 Auutolux Motors</p>
    </footer>
    
</body>
</html>
